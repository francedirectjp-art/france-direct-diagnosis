<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーチダッシュボード | France Direct</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #b49650; --gold-light: #c8aa6e; --gold-dim: rgba(180,150,80,0.12);
  --dark: #0a0a14; --dark2: #0e0e1e; --dark3: #141428;
  --text: #dde2f0; --text-muted: #6878a0; --border: rgba(180,150,80,0.18);
  --green: #4aaa70; --yellow: #c8a828; --orange: #d07830; --red: #d04848;
}
body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

/* HEADER */
.app-header { background: var(--dark2); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
.app-header h1 { font-size: 12px; color: var(--gold); letter-spacing: 0.12em; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 12px; }
.coach-email { font-size: 10px; color: var(--text-muted); }
.logout-btn { font-size: 10px; color: var(--text-muted); background: transparent; border: 1px solid var(--border); padding: 5px 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.logout-btn:hover { color: var(--text); border-color: var(--text-muted); }

/* LOGIN */
#loginView { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { width: 100%; max-width: 360px; background: var(--dark3); border: 1px solid var(--border); padding: 36px 28px; }
.login-logo { font-size: 9px; color: var(--gold); letter-spacing: 0.22em; font-weight: 700; margin-bottom: 10px; }
.login-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.login-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.7; }
.login-label { font-size: 10px; color: var(--text-muted); margin-bottom: 5px; display: block; letter-spacing: 0.05em; }
.login-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); padding: 11px 12px; font-size: 13px; font-family: inherit; margin-bottom: 14px; transition: border-color 0.15s; }
.login-input:focus { outline: none; border-color: var(--gold); }
.login-btn { width: 100%; background: var(--gold); color: var(--dark); border: none; padding: 15px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.08em; transition: background 0.2s; }
.login-btn:hover { background: var(--gold-light); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error { font-size: 11px; color: var(--red); margin-top: 12px; line-height: 1.6; min-height: 16px; }

/* DASHBOARD */
#dashView { display: none; }
.container { max-width: 1020px; margin: 0 auto; padding: 20px 14px 80px; }

/* Stats bar */
.stats-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card { background: var(--dark3); border: 1px solid var(--border); padding: 14px 18px; flex: 1; min-width: 120px; }
.stat-val { font-size: 24px; font-weight: 700; color: var(--gold); line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.04em; }

/* Toolbar */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 180px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; font-size: 12px; font-family: inherit; }
.search-input:focus { outline: none; border-color: var(--gold); }
.filter-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 9px 14px; font-size: 11px; cursor: pointer; font-family: inherit; white-space: nowrap; transition: all 0.15s; }
.filter-btn.active, .filter-btn:hover { color: var(--gold); border-color: var(--gold); background: var(--gold-dim); }
.refresh-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 9px 16px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.06em; transition: all 0.15s; }
.refresh-btn:hover { background: var(--gold-dim); }

/* Client list */
.section-title { font-size: 10px; color: var(--text-muted); letter-spacing: 0.12em; font-weight: 700; margin-bottom: 10px; }
.client-list { display: flex; flex-direction: column; gap: 5px; }
.client-row { background: var(--dark3); border: 1px solid var(--border); padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; transition: border-color 0.15s; }
.client-row:hover, .client-row.active { border-color: var(--gold); background: rgba(180,150,80,0.05); }
.cr-name { font-size: 14px; font-weight: 700; color: var(--text); min-width: 110px; }
.cr-date { font-size: 10px; color: var(--text-muted); min-width: 80px; }
.cr-job  { font-size: 10px; color: var(--text-muted); min-width: 80px; }
.cr-badges { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
.axis-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border: 1px solid; white-space: nowrap; }
.badge-green  { color: var(--green);  border-color: var(--green);  background: rgba(74,170,112,0.08); }
.badge-yellow { color: var(--yellow); border-color: var(--yellow); background: rgba(200,168,40,0.08); }
.badge-orange { color: var(--orange); border-color: var(--orange); background: rgba(208,120,48,0.08); }
.badge-red    { color: var(--red);    border-color: var(--red);    background: rgba(208,72,72,0.08); }
.cr-alert { font-size: 9px; color: var(--red); font-weight: 700; white-space: nowrap; }
.cr-arrow { color: var(--text-muted); font-size: 14px; margin-left: auto; flex-shrink: 0; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 12px; line-height: 2.2; border: 1px dashed var(--border); }

/* DETAIL PANEL */
#detailPanel { display: none; margin-top: 28px; border-top: 1px solid var(--border); padding-top: 24px; }
.detail-close { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-muted); font-size: 11px; margin-bottom: 18px; padding: 6px 0; }
.detail-close:hover { color: var(--text); }

.detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.detail-name { font-size: 24px; font-weight: 700; color: var(--gold); }
.detail-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.7; }
.detail-meta { text-align: right; }
.detail-date { font-size: 11px; color: var(--text-muted); line-height: 1.7; }
.btn-pdf { background: var(--gold); color: var(--dark); border: none; padding: 10px 20px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.06em; margin-top: 8px; transition: background 0.2s; }
.btn-pdf:hover { background: var(--gold-light); }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media (max-width: 680px) { .two-col { grid-template-columns: 1fr; } }

.panel-card { background: var(--dark3); border: 1px solid var(--border); padding: 18px; margin-bottom: 14px; }
.panel-card-title { font-size: 9px; color: var(--gold); letter-spacing: 0.18em; font-weight: 700; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.chart-wrap { max-width: 300px; margin: 0 auto; }

.d-score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sc-card { background: var(--dark); border: 1px solid var(--border); padding: 10px 12px; }
.sc-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.sc-label { font-size: 10px; font-weight: 700; color: var(--text); }
.sc-val { font-size: 20px; font-weight: 700; line-height: 1; }
.sc-bar-bg { height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
.sc-bar-fill { height: 100%; border-radius: 2px; }
.sc-level { font-size: 9px; color: var(--text-muted); }

.c-green{color:var(--green)} .c-yellow{color:var(--yellow)} .c-orange{color:var(--orange)} .c-red{color:var(--red)}
.f-green{background:var(--green)} .f-yellow{background:var(--yellow)} .f-orange{background:var(--orange)} .f-red{background:var(--red)}

.alert-block { background: var(--dark3); border: 1px solid rgba(208,72,72,0.35); padding: 14px 18px; margin-bottom: 14px; }
.alert-block-title { font-size: 9px; color: var(--red); letter-spacing: 0.18em; font-weight: 700; margin-bottom: 10px; }
.alert-item { display: flex; gap: 8px; margin-bottom: 6px; font-size: 11px; color: var(--text); line-height: 1.5; align-items: flex-start; }
.alert-dot { width: 5px; height: 5px; background: var(--red); border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

.coach-block { margin-bottom: 12px; }
.coach-block:last-child { margin-bottom: 0; }
.coach-block-lbl { font-size: 9px; color: var(--gold); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 5px; }
.coach-block-text { font-size: 11px; color: var(--text); line-height: 1.9; background: rgba(255,255,255,0.025); padding: 9px 12px; border-left: 2px solid var(--gold); }

.focus-tag { font-size: 11px; background: var(--gold-dim); border: 1px solid var(--gold); color: var(--gold); padding: 3px 10px; display: inline-block; margin: 3px 4px 3px 0; }
.ft-q { font-size: 10px; color: var(--text-muted); margin-top: 12px; margin-bottom: 5px; }
.ft-q:first-child { margin-top: 0; }
.ft-a { font-size: 11px; color: var(--text); line-height: 1.8; background: rgba(255,255,255,0.025); padding: 8px 12px; border-left: 2px solid var(--gold); white-space: pre-wrap; min-height: 40px; }

.loading { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 12px; }

/* Toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--gold); color: var(--dark); padding: 11px 22px; font-size: 12px; font-weight: 700; opacity: 0; transition: all 0.28s; pointer-events: none; z-index: 9999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Print */
@media print {
  body { background: #fff !important; color: #000 !important; }
  .app-header, #loginView, .stats-bar, .toolbar, .client-list, .section-title, .detail-close, .btn-pdf { display: none !important; }
  #dashView, #detailPanel { display: block !important; }
  .panel-card, .sc-card, .alert-block { background: #fff !important; border: 1px solid #ddd !important; break-inside: avoid; }
  .detail-name { color: #333 !important; }
  .panel-card-title, .coach-block-lbl, .alert-block-title { color: #333 !important; }
  .coach-block-text, .ft-a { background: #f8f8f8 !important; color: #000 !important; }
  .two-col { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<header class="app-header">
  <h1>COACH DASHBOARD　|　France Direct</h1>
  <div class="header-right">
    <span class="coach-email" id="coachEmail"></span>
    <button class="logout-btn" onclick="logout()">ログアウト</button>
  </div>
</header>

<!-- LOGIN -->
<div id="loginView">
  <div class="login-box">
    <div class="login-logo">FRANCE DIRECT</div>
    <div class="login-title">コーチログイン</div>
    <div class="login-sub">認証されたコーチのみアクセスできます</div>
    <label class="login-label">メールアドレス</label>
    <input class="login-input" type="email" id="loginEmail" placeholder="coach@example.com" onkeydown="if(event.key==='Enter')doLogin()">
    <label class="login-label">パスワード</label>
    <input class="login-input" type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashView">
  <div class="container">

    <div class="stats-bar">
      <div class="stat-card"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">総診断数</div></div>
      <div class="stat-card"><div class="stat-val" id="statToday">—</div><div class="stat-lbl">本日</div></div>
      <div class="stat-card"><div class="stat-val" id="statWeek">—</div><div class="stat-lbl">今週</div></div>
      <div class="stat-card"><div class="stat-val" id="statAlert" style="color:var(--red)">—</div><div class="stat-lbl">要注意クライアント</div></div>
    </div>

    <div class="toolbar">
      <input class="search-input" type="text" id="searchInput" placeholder="名前で検索..." oninput="filterList()">
      <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">すべて</button>
      <button class="filter-btn" id="filterToday" onclick="setFilter('today')">本日</button>
      <button class="filter-btn" id="filterWeek" onclick="setFilter('week')">今週</button>
      <button class="filter-btn" id="filterAlert" onclick="setFilter('alert')">要注意</button>
      <button class="refresh-btn" onclick="loadDiagnoses()">↻ 更新</button>
    </div>

    <div class="section-title" id="listLabel">クライアント一覧</div>
    <div class="client-list" id="clientList"><div class="loading">読み込み中...</div></div>

    <!-- DETAIL -->
    <div id="detailPanel">
      <div class="detail-close" onclick="closeDetail()">← 一覧に戻る</div>

      <div class="detail-header">
        <div>
          <div class="detail-name" id="dName"></div>
          <div class="detail-sub" id="dSub"></div>
        </div>
        <div class="detail-meta">
          <div class="detail-date" id="dDate"></div>
          <button class="btn-pdf" onclick="window.print()">PDFで保存</button>
        </div>
      </div>

      <div class="two-col">
        <div class="panel-card">
          <div class="panel-card-title">レーダーチャート</div>
          <div class="chart-wrap"><canvas id="detailRadar"></canvas></div>
        </div>
        <div class="panel-card">
          <div class="panel-card-title">軸別スコア</div>
          <div class="d-score-grid" id="dScoreGrid"></div>
        </div>
      </div>

      <div class="alert-block" id="dAlertBlock" style="display:none;">
        <div class="alert-block-title">HIGH ALERT — スコア4以上の項目</div>
        <div id="dAlertList"></div>
      </div>

      <div class="panel-card" style="margin-bottom:14px;">
        <div class="panel-card-title">COACH NOTE — 読み取りガイド</div>
        <div id="dCoachContent"></div>
      </div>

      <div class="two-col">
        <div class="panel-card" id="dFocusPanel" style="display:none;">
          <div class="panel-card-title">TODAY'S FOCUS</div>
          <div id="dFocusTags"></div>
        </div>
        <div class="panel-card" id="dFtPanel" style="display:none;">
          <div class="panel-card-title">FREE TEXT — 記述回答</div>
          <div id="dFtContent"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================================================
// SUPABASE
// ===================================================
const SUPABASE_URL = 'https://fnzimwshyctxkxyzfkpv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZuemltd3NoeWN0eGt4eXpma3B2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzE0OTEsImV4cCI6MjA4ODU0NzQ5MX0.Yt1DjKFA8L7IlG8ap-cr0Cv3D2TlBKesu3SNnSjB_UU';
let db = null;

// ===================================================
// AXES & QUESTIONS
// ===================================================
const axes = [
  { key:'recovery',  label:'回復力',     qs:[1,5] },
  { key:'digestion', label:'消化・腸',   qs:[2,11,15] },
  { key:'brain',     label:'脳・集中',   qs:[3,4,8] },
  { key:'judgment',  label:'判断精度',   qs:[6,7,9,10] },
  { key:'autonomic', label:'自律神経',   qs:[12,13,14] },
  { key:'timing',    label:'タイミング', qs:[16,17,18] },
];
const questions = [
  {id:1, text:'朝起きた時点で、すでに疲れが残っている感じがある'},
  {id:2, text:'食後に眠気や頭の重さが出やすい'},
  {id:3, text:'夕方以降、思考のキレが落ちやすい'},
  {id:4, text:'忙しい時ほど、集中力が続きにくい'},
  {id:5, text:'以前に比べて、回復に時間がかかるようになった'},
  {id:6, text:'最近、決断に時間がかかることが増えた'},
  {id:7, text:'本来なら待てる場面で焦りやすいと感じる'},
  {id:8, text:'情報量が多い日ほど、頭が散りやすい'},
  {id:9, text:'頭では分かっていても、身体がついてこない感覚がある'},
  {id:10,text:'「本来の自分ならもっと冴えていたのに」と感じることがある'},
  {id:11,text:'胃腸の重さ、もたれ、張りを感じることがある'},
  {id:12,text:'睡眠の質に課題を感じる'},
  {id:13,text:'首肩のこり、頭の重さ、目の疲れが出やすい'},
  {id:14,text:'疲れているのに気が張って休まりにくい'},
  {id:15,text:'人に会った後や会食の後に、必要以上に疲れやすい'},
  {id:16,text:'今は攻めたい気持ちはあるが、土台が追いついていない感覚がある'},
  {id:17,text:'動いてはいるが、流れが噛み合っていない感じがある'},
  {id:18,text:'今ここで一度しっかり整えると、その後の伸びが変わる気がする'},
];

function getColor(s) {
  if(s<2) return {cls:'c-green', fill:'f-green', label:'良好',   badge:'badge-green'};
  if(s<3) return {cls:'c-yellow',fill:'f-yellow',label:'注意',   badge:'badge-yellow'};
  if(s<4) return {cls:'c-orange',fill:'f-orange',label:'要対処', badge:'badge-orange'};
  return       {cls:'c-red',   fill:'f-red',   label:'要即対応',badge:'badge-red'};
}

// ===================================================
// INIT
// ===================================================
let allData = [], currentFilter = 'all', detailChart = null;

document.addEventListener('DOMContentLoaded', async () => {
  try {
    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data:{ session } } = await db.auth.getSession();
    if (session) showDash(session.user);
  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('loginError').textContent = 'システムエラー: ' + e.message;
  }
});

// ===================================================
// AUTH
// ===================================================
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');

  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'メールとパスワードを入力してください'; return; }

  btn.disabled = true;
  btn.textContent = '認証中...';

  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
    if (error) {
      errEl.textContent = 'ログイン失敗: ' + error.message;
      btn.disabled = false; btn.textContent = 'ログイン';
    } else {
      showDash(data.user);
    }
  } catch(e) {
    errEl.textContent = '通信エラー: ' + e.message;
    btn.disabled = false; btn.textContent = 'ログイン';
  }
}

async function logout() {
  await db.auth.signOut();
  document.getElementById('dashView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'ログイン';
  document.getElementById('loginPassword').value = '';
  document.getElementById('coachEmail').textContent = '';
  closeDetail();
}

function showDash(user) {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('dashView').style.display = 'block';
  document.getElementById('coachEmail').textContent = user.email;
  loadDiagnoses();
}

// ===================================================
// LOAD DATA
// ===================================================
async function loadDiagnoses() {
  document.getElementById('clientList').innerHTML = '<div class="loading">読み込み中...</div>';
  closeDetail();

  try {
    const { data, error } = await db.from('diagnoses').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    allData = data || [];
    updateStats();
    filterList();
  } catch(e) {
    document.getElementById('clientList').innerHTML = `<div class="loading" style="color:var(--red)">読み込みエラー: ${e.message}</div>`;
  }
}

// ===================================================
// STATS
// ===================================================
function updateStats() {
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const weekAgo = new Date(now - 7*24*60*60*1000);

  const today = allData.filter(d => d.created_at.startsWith(todayStr)).length;
  const week  = allData.filter(d => new Date(d.created_at) >= weekAgo).length;
  const alert = allData.filter(d => {
    const scores = d.scores || {};
    return Object.values(scores).some(s => s >= 4);
  }).length;

  document.getElementById('statTotal').textContent = allData.length;
  document.getElementById('statToday').textContent = today;
  document.getElementById('statWeek').textContent  = week;
  document.getElementById('statAlert').textContent = alert;
}

// ===================================================
// FILTER
// ===================================================
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`filter${f.charAt(0).toUpperCase()+f.slice(1)}`).classList.add('active');
  filterList();
}

function filterList() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const weekAgo = new Date(now - 7*24*60*60*1000);

  let items = [...allData];
  if (currentFilter === 'today') items = items.filter(d => d.created_at.startsWith(todayStr));
  if (currentFilter === 'week')  items = items.filter(d => new Date(d.created_at) >= weekAgo);
  if (currentFilter === 'alert') items = items.filter(d => Object.values(d.scores||{}).some(s=>s>=4));
  if (q) items = items.filter(d => (d.client_name||'').toLowerCase().includes(q));

  document.getElementById('listLabel').textContent = `クライアント一覧（${items.length}件）`;
  renderList(items);
}

function renderList(items) {
  const el = document.getElementById('clientList');
  if (!items.length) {
    el.innerHTML = '<div class="empty-state">該当するデータがありません。<br>クライアントがアンケートを送信すると、ここに表示されます。</div>';
    return;
  }
  el.innerHTML = items.map(d => {
    const scores = d.scores || {};
    const dateStr = d.meeting_date
      ? new Date(d.meeting_date+'T00:00:00').toLocaleDateString('ja-JP',{month:'short',day:'numeric'})
      : new Date(d.created_at).toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
    const badges = axes.map(ax => {
      const s = scores[ax.key]||0, c = getColor(s);
      return `<span class="axis-badge ${c.badge}">${ax.label} ${s.toFixed(1)}</span>`;
    }).join('');
    const hasAlert = Object.values(scores).some(s=>s>=4);
    return `<div class="client-row" onclick="showDetail('${d.id}')">
      <div class="cr-name">${d.client_name||'名前なし'}</div>
      <div class="cr-date">${dateStr}</div>
      <div class="cr-job">${d.client_job||''}</div>
      <div class="cr-badges">${badges}</div>
      ${hasAlert?'<div class="cr-alert">⚠ 要注意</div>':''}
      <div class="cr-arrow">›</div>
    </div>`;
  }).join('');
}

// ===================================================
// DETAIL
// ===================================================
function showDetail(id) {
  const d = allData.find(x=>x.id===id);
  if (!d) return;

  document.querySelectorAll('.client-row').forEach(r=>r.classList.remove('active'));
  const row = document.querySelector(`.client-row[onclick="showDetail('${id}')"]`);
  if (row) row.classList.add('active');

  const scores  = d.scores  || {};
  const answers = d.answers || {};

  // Header
  document.getElementById('dName').textContent = (d.client_name||'名前なし') + ' 様';
  const sub = [d.client_job, d.client_email].filter(Boolean).join('　|　');
  document.getElementById('dSub').textContent = sub;
  const dateStr = d.meeting_date
    ? new Date(d.meeting_date+'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'})
    : new Date(d.created_at).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('dDate').innerHTML = `France Direct　身体ポートフォリオ診断<br>${dateStr}`;

  // Radar
  buildDetailRadar(scores);

  // Scores
  document.getElementById('dScoreGrid').innerHTML = axes.map(ax=>{
    const s=scores[ax.key]||0, c=getColor(s);
    return `<div class="sc-card">
      <div class="sc-top"><div class="sc-label">${ax.label}</div><div class="sc-val ${c.cls}">${s.toFixed(1)}</div></div>
      <div class="sc-bar-bg"><div class="sc-bar-fill ${c.fill}" style="width:${(s/5)*100}%"></div></div>
      <div class="sc-level ${c.cls}">${c.label}</div>
    </div>`;
  }).join('');

  // Alerts
  const highQ = questions.filter(q=>answers[q.id]>=4);
  if (highQ.length) {
    document.getElementById('dAlertBlock').style.display='block';
    document.getElementById('dAlertList').innerHTML = highQ.map(q=>`
      <div class="alert-item"><div class="alert-dot"></div>
      <div><span style="color:var(--red);font-weight:700">Q${q.id}</span>（${answers[q.id]}点）${q.text}</div></div>`).join('');
  } else document.getElementById('dAlertBlock').style.display='none';

  // Coach notes
  buildDetailCoach(scores, document.getElementById('dCoachContent'));

  // Focus
  const focuses = d.focuses||[];
  if (focuses.length) {
    document.getElementById('dFocusPanel').style.display='block';
    document.getElementById('dFocusTags').innerHTML = focuses.map(f=>`<span class="focus-tag">${f}</span>`).join('');
  } else document.getElementById('dFocusPanel').style.display='none';

  // Free text
  const ft1=d.free_text1||'', ft2=d.free_text2||'';
  if (ft1||ft2) {
    document.getElementById('dFtPanel').style.display='block';
    let h='';
    if(ft1) h+=`<div class="ft-q">今、一番整えたいこと</div><div class="ft-a">${ft1}</div>`;
    if(ft2) h+=`<div class="ft-q">半年後の理想状態</div><div class="ft-a">${ft2}</div>`;
    document.getElementById('dFtContent').innerHTML=h;
  } else document.getElementById('dFtPanel').style.display='none';

  document.getElementById('detailPanel').style.display='block';
  document.getElementById('detailPanel').scrollIntoView({behavior:'smooth',block:'start'});
}

function closeDetail() {
  document.getElementById('detailPanel').style.display='none';
  document.querySelectorAll('.client-row').forEach(r=>r.classList.remove('active'));
  if (detailChart) { detailChart.destroy(); detailChart=null; }
}

// ===================================================
// DETAIL RADAR
// ===================================================
function buildDetailRadar(scores) {
  if (detailChart) { detailChart.destroy(); detailChart=null; }
  document.querySelector('.chart-wrap').innerHTML='<canvas id="detailRadar"></canvas>';
  detailChart = new Chart(document.getElementById('detailRadar').getContext('2d'), {
    type:'radar',
    data:{
      labels: axes.map(ax=>ax.label),
      datasets:[{
        label:'現在地', data:axes.map(ax=>scores[ax.key]||0),
        backgroundColor:'rgba(180,150,80,0.18)', borderColor:'#b49650', borderWidth:2,
        pointBackgroundColor:'#b49650', pointBorderColor:'#b49650', pointRadius:5, pointHoverRadius:7,
      }]
    },
    options:{
      responsive:true,
      scales:{r:{
        min:0,max:5,
        ticks:{stepSize:1,color:'rgba(180,150,80,0.5)',font:{size:9},backdropColor:'transparent'},
        grid:{color:'rgba(180,150,80,0.12)'},
        angleLines:{color:'rgba(180,150,80,0.15)'},
        pointLabels:{color:'#dde2f0',font:{size:11,weight:'bold'}}
      }},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}：${ctx.raw.toFixed(1)} / 5.0`}}}
    }
  });
}

// ===================================================
// DETAIL COACH NOTES
// ===================================================
function buildDetailCoach(scores, container) {
  const sorted = axes.map(ax=>({...ax,score:scores[ax.key]||0})).sort((a,b)=>b.score-a.score);
  const avg = sorted.reduce((s,ax)=>s+ax.score,0)/axes.length;

  const summary = avg<2
    ? '全体的に比較的安定した状態です。ただし、高スコアの項目は先手を打った対処が有効です。'
    : avg<3
    ? 'いくつかの領域で負担が蓄積しています。今の段階で整えると変化が出やすいタイミングです。'
    : '複数の領域で負担が出ています。身体の不良債権が判断精度を削っている可能性が高い状態です。';

  const interps = {
    recovery: {low:'回復力は比較的維持されています。',mid:'回復に少し時間がかかるサインが出ています。',high:'回復の土台に負担がかかっています。睡眠と腸の状態を優先的に確認してください。'},
    digestion:{low:'消化器系は比較的安定しています。',mid:'食後のパフォーマンス低下が判断精度に影響し始めています。',high:'ハーブファスティングによる腸のリセットが有効な状態です。'},
    brain:    {low:'思考・集中力は比較的維持されています。',mid:'夕方以降の集中力低下が出やすい状態です。',high:'脳疲労により本来の思考速度・集中力が出にくい状態です。'},
    judgment: {low:'判断精度は比較的安定しています。',mid:'決断の迷いや焦りが出やすい状態です。',high:'意思決定の質に直接影響が出ています。身体のノイズを取り除くことが急務です。'},
    autonomic:{low:'自律神経は比較的安定しています。',mid:'気を張りすぎる・休んでも抜けきらない状態が出ています。',high:'自律神経の乱れが回復と判断の両方を圧迫しています。'},
    timing:   {low:'今は比較的フローに乗れている感覚があります。',mid:'流れとのズレを感じているサインが出ています。',high:'今は攻めよりも整えを優先すべき時期のサインが出ています。'},
  };
  const gi=(key,s)=>{const i=interps[key];return s<2?i.low:s<3.5?i.mid:i.high;};

  const top=sorted[0],sec=sorted[1];
  const combos={'recovery+digestion':'回復力と消化器系の両方に負荷がかかっています。腸のリセットが最初のステップです。','digestion+brain':'腸と脳のつながりに負荷がかかっています。消化器のリセットが脳のクリア感に直結します。','brain+judgment':'思考と判断の両方にノイズが入っています。脳疲労のリセットで本来の精度が戻りやすい状態です。','autonomic+timing':'自律神経の乱れが流れとのズレを生んでいます。'};
  const tp=top.score>=3?(combos[`${top.key}+${sec.key}`]||combos[`${sec.key}+${top.key}`]||`特に「${top.label}」と「${sec.label}」への対処が優先度高です。`):'今はまだ余裕がある段階です。予防的なメンテナンスを始めるには良いタイミングです。';

  const highAxes=sorted.filter(ax=>ax.score>=3);
  let blocks=`<div class="coach-block"><div class="coach-block-lbl">総評</div><div class="coach-block-text">${summary}</div></div>`;
  blocks+=highAxes.map(ax=>`<div class="coach-block"><div class="coach-block-lbl">${ax.label}（${ax.score.toFixed(1)}）</div><div class="coach-block-text">${gi(ax.key,ax.score)}</div></div>`).join('');
  blocks+=`<div class="coach-block"><div class="coach-block-lbl">会話の入口</div><div class="coach-block-text">${tp}</div></div>`;
  container.innerHTML=blocks;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
